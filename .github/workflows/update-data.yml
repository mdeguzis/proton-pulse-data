name: Update ProtonDB Data

on:
  schedule:
    # Running on the 1st of the month is usually sufficient for the official dump
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      dump_url:
        description: 'Override dump URL (default is official ProtonDB live dump)'
        required: false
        default: 'https://www.protondb.com/admin/reports/reports.json.gz'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          # This keeps your Python scripts available
          path: scripts-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare Download URL
        id: detect
        run: |
          # Use input override or default to the official live dump
          URL="${{ github.event.inputs.dump_url }}"
          if [ -z "$URL" ]; then
            URL="https://www.protondb.com/admin/reports/reports.json.gz"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Selected dump URL: $URL"

      - name: Download dump
        run: |
          # Using .json.gz as the extension to reflect the official source
          curl -L --progress-bar \
            "${{ steps.detect.outputs.url }}" \
            -o /tmp/protondb-dump.json.gz

      - name: Split reports by game
        run: |
          mkdir -p /tmp/protondb-output
          # Note: Ensure split_reports.py is updated to handle .json.gz (gzip) 
          # instead of .tar.gz (tarfile) if it wasn't already polymorphic.
          python3 scripts-repo/scripts/split_reports.py \
            /tmp/protondb-dump.json.gz \
            /tmp/protondb-output

      - name: Show output stats
        run: |
          echo "=== index.json ==="
          [ -f /tmp/protondb-output/index.json ] && cat /tmp/protondb-output/index.json || echo "index.json not found"
          echo -e "\n=== data/ file count ==="
          ls /tmp/protondb-output/data/ 2>/dev/null | wc -l || echo "0"
          echo -e "\n=== total data/ size ==="
          du -sh /tmp/protondb-output/data/ 2>/dev/null || echo "No data directory"

      - name: Publish to gh-pages (orphan, no history)
        run: |
          cd /tmp/protondb-output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages

          touch .nojekyll
          git add -A
          git commit -m "chore: update ProtonDB data $(date -u +%Y-%m-%d)"

          git remote add origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          git push --force origin gh-pages
          echo "Published to https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
