name: Update ProtonDB Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dump_url:
        description: 'Override dump URL (Leave blank for latest)'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout scripts-repo
        uses: actions/checkout@v4
        with:
          path: scripts-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ijson

      - name: Download Active Dump
        id: download
        run: |
          # This is the verified active data endpoint for ProtonDB
          URL="https://www.protondb.com/data/reports.json.gz"
          
          if [ -n "${{ github.event.inputs.dump_url }}" ]; then
            URL="${{ github.event.inputs.dump_url }}"
          fi
          
          echo "Downloading from: $URL"
          
          # We use -H "Accept-Encoding: gzip" to ensure the server sends the compressed stream
          # and a generic User-Agent to pass basic bot filters.
          curl -L -v \
            -H "Accept-Encoding: gzip" \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
            --compressed \
            "$URL" -o /tmp/protondb-dump.json.gz
          
          # Verification
          FILE_INFO=$(file /tmp/protondb-dump.json.gz)
          echo "File Info: $FILE_INFO"
          
          if [[ "$FILE_INFO" == *"gzip compressed data"* ]]; then
            echo "Success: Valid Gzip file received."
          else
            echo "ERROR: Received non-gzip data. Server likely sent an error page."
            head -n 20 /tmp/protondb-dump.json.gz
            exit 1
          fi

      - name: Split reports by game
        run: |
          mkdir -p /tmp/protondb-output
          python3 scripts-repo/scripts/split_reports.py \
            /tmp/protondb-dump.json.gz \
            /tmp/protondb-output

      - name: Publish to gh-pages
        run: |
          cd /tmp/protondb-output
          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          touch .nojekyll
          git add -A
          git commit -m "chore: active data sync $(date -u +%Y-%m-%d)"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
