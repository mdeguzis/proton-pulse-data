name: Update ProtonDB Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"
  PROTONDB_PROBE_LIMIT: "5000"
  PROTONDB_PROBE_BACKFILL_LIMIT: "0"
  PROTONDB_PROBE_LOG_EVERY: "100"

jobs:
  build-base:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout Official ProtonDB Data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Restore pipeline cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-base
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Write local .env from secret
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
            echo "[steam-catalog] .env written from GitHub secret"
          else
            echo "[steam-catalog] STEAM_API_KEY secret not available to build job"
          fi

      - name: Process Official Reports
        run: |
          mkdir -p /tmp/protondb-output
          uv run python scripts/split_reports.py process \
            official-data/reports \
            /tmp/protondb-output

      - name: Backfill Missing Apps
        run: |
          uv run python scripts/split_reports.py backfill \
            /tmp/protondb-output

      - name: Save pipeline cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-base

      - name: Upload probe input artifact
        uses: actions/upload-artifact@v4
        with:
          name: probe-input
          path: |
            /tmp/protondb-output/data
            /tmp/protondb-output/pipeline-state.json

  probe-plan:
    needs: build-base
    runs-on: ubuntu-24.04
    outputs:
      chunk_count: ${{ steps.plan.outputs.chunk_count }}
      chunk_matrix: ${{ steps.plan.outputs.chunk_matrix }}
    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Download probe input artifact
        uses: actions/download-artifact@v4
        with:
          name: probe-input
          path: /tmp/protondb-output

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-plan
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Write local .env from secret
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
            echo "[steam-catalog] .env written from GitHub secret"
          else
            echo "[steam-catalog] STEAM_API_KEY secret not available to plan job"
          fi

      - name: Build probe chunk plan
        id: plan
        run: |
          uv run python scripts/split_reports.py probe-plan /tmp/protondb-output > /tmp/probe-plan.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          plan = json.loads(Path("/tmp/probe-plan.json").read_text())
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"chunk_count={plan['chunk_count']}\n")
              fh.write(f"chunk_matrix={json.dumps(plan['chunks'])}\n")
          print(f"[protondb-probe] chunk_count={plan['chunk_count']}, uncached={plan['uncached_count']}")
          PY

  probe-chunks:
    needs: [build-base, probe-plan]
    if: needs.probe-plan.outputs.chunk_count != '0'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        chunk: ${{ fromJson(needs.probe-plan.outputs.chunk_matrix) }}
    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Download probe input artifact
        uses: actions/download-artifact@v4
        with:
          name: probe-input
          path: /tmp/protondb-output

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-chunk-${{ matrix.chunk }}
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Write local .env from secret
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
            echo "[steam-catalog] .env written from GitHub secret"
          else
            echo "[steam-catalog] STEAM_API_KEY secret not available to probe job"
          fi

      - name: Probe ProtonDB summary chunk ${{ matrix.chunk }}
        run: |
          uv run python scripts/split_reports.py probe /tmp/protondb-output

      - name: Save pipeline cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-chunk-${{ matrix.chunk }}

  build-site:
    needs: [build-base, probe-plan, probe-chunks]
    if: |
      always() &&
      needs.build-base.result == 'success' &&
      needs.probe-plan.result == 'success' &&
      (needs.probe-chunks.result == 'success' || needs.probe-chunks.result == 'skipped')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Download probe input artifact
        uses: actions/download-artifact@v4
        with:
          name: probe-input
          path: /tmp/protondb-output

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-final
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Write local .env from secret
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
            echo "[steam-catalog] .env written from GitHub secret"
          else
            echo "[steam-catalog] STEAM_API_KEY secret not available to build job"
          fi

      - name: Backfill Probe Discoveries
        run: |
          uv run python scripts/split_reports.py probe-backfill \
            /tmp/protondb-output

      - name: Finalize (Indexes + Coverage)
        run: |
          uv run python scripts/split_reports.py finalize --skip-probe \
            /tmp/protondb-output

      - name: Save pipeline cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-final

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-content
          path: |
            /tmp/protondb-output/data
            /tmp/protondb-output/index.html
            /tmp/protondb-output/coverage.html

  deploy-pages:
    needs: build-site
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-content
          path: /tmp/protondb-output

      - name: Deploy to gh-pages (orphan - no history)
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout --orphan gh-pages-new
          git rm -rf .
          cp -r /tmp/protondb-output/data .
          cp /tmp/protondb-output/index.html .
          cp /tmp/protondb-output/coverage.html .
          git add data/ index.html coverage.html
          git commit -m "Deploy: $(date +%F)"
          git push origin gh-pages-new:gh-pages --force

  report-build-status:
    needs: [build-base, probe-plan, probe-chunks, build-site, deploy-pages]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Summary
        run: |
          echo "### Update ProtonDB Data" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build base | ${{ needs.build-base.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Probe plan | ${{ needs.probe-plan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Probe chunks | ${{ needs.probe-chunks.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build site | ${{ needs.build-site.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy Pages | ${{ needs.deploy-pages.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
